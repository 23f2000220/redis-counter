services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - default

  api:
    build: .
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8004:8000"
    restart: unless-stopped
    networks:
      - default

networks:
  default:
